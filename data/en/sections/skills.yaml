# section information
section:
  name: Technical Skills
  id: skills
  enable: true
  weight: 2
  showOnNavbar: true
  # Can optionally hide the title in sections
  # hideTitle: true

# Your Skills.
# Give a summary of you each skill in the summary section.
# `logo` is an image path resolved via Hugo Pipes, relative to the assets/
# directory (no leading slash) - the toha theme's skill card only treats
# `icon` as a Font Awesome CSS class, not an image path.
# `cv:` is a CV-only block consumed by cv/generate/render_cv.py, rendering
# this skill as one row of the CV's skills table (`label` overrides the row
# heading, falling back to `name`; `bold` matches the current CV's emphasis).
skills:
- name: Computer Networking and SDN
  logo: "images/sections/skills/networking.svg"
  summary: "Cisco IOS, Open vSwitch, ArubaOS-Switch, OpenFlow, Python Ryu."
  cv:
    label: "Computer Networking"
    items:
    - {text: "Cisco IOS", bold: true}
    - {text: "Open vSwitch", bold: true}
    - {text: "ArubaOS-Switch", bold: true}
    - {text: "OpenFlow", bold: true}
    - {text: "Python Ryu", bold: true}

- name: Programming
  logo: "images/sections/skills/dev.svg"
  summary: "Python, JavaScript, Django, MATLAB, Java, C/C++"
  cv:
    items:
    - {text: "Python", bold: true}
    - {text: "JavaScript", bold: true}
    - {text: "Django", bold: true}
    - {text: "MATLAB", bold: true}
    - {text: "Java", bold: false}
    - {text: "C/C++", bold: false}

- name: Virtualization
  logo: "images/sections/skills/linux.png"
  summary: "Proxmox VE, XCP-ng, VMware Workstation."
  cv:
    items:
    - {text: "Proxmox VE", bold: true}
    - {text: "XCP-ng", bold: false}
    - {text: "VMware Workstation", bold: false}

- name: DevOps
  logo: "images/sections/skills/git.png"
  summary: "Docker, GitLab CI/CD, GitHub Actions."
  cv:
    items:
    - {text: "Docker", bold: true}
    - {text: "GitLab CI/CD", bold: true}
    - {text: "GitHub Actions", bold: true}

- name: Cybersecurity
  logo: "images/sections/skills/cybersecurity.svg"
  summary: "pfSense, OpenVPN, Python Scapy, Wazuh, OIDC, PKI."
  cv:
    items:
    - {text: "pfSense", bold: true}
    - {text: "OpenVPN", bold: true}
    - {text: "Python Scapy", bold: true}
    - {text: "Wazuh", bold: true}
    - {text: "OIDC", bold: false}
    - {text: "PKI", bold: false}

- name: Industrial IoT
  logo: "images/sections/skills/iot.svg"
  summary: "Modbus TCP, OCPP 1.6-J, MQTT, DLMS/COSEM."
  cv:
    items:
    - {text: "Modbus TCP", bold: true}
    - {text: "OCPP 1.6-J", bold: true}
    - {text: "MQTT", bold: true}
    - {text: "DLMS/COSEM", bold: false}

- name: Telecommunications
  logo: "images/sections/skills/cloud.png"
  summary: "ITU-T PONs, Simulation (OMNeT++, GNS3)."
  cv:
    items:
    - {text: "ITU-T PONs", bold: false}
    - {text: "Simulation (OMNeT++, GNS3)", bold: false}

- name: Miscellaneous
  logo: "images/sections/skills/cloud.png"
  summary: "Troubleshooting, Horizon Europe Project Management, Office Suite, LaTeX."
  cv:
    items:
    - {text: "Troubleshooting", bold: false}
    - {text: "Horizon Europe Project Management", bold: false}
    - {text: "Office Suite", bold: false}
    - {text: "LaTeX", bold: false}

- name: Languages
  logo: "images/sections/skills/cloud.png"
  summary: "Greek (native), English (C2), German (C1)."
  cv:
    items:
    - {text: "Greek (native)", bold: false}
    - {text: "English (C2)", bold: false}
    - {text: "German (C1)", bold: false}

